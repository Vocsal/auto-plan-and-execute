name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  shell-syntax:
    name: Shell 语法 & shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n 语法检查
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            echo "checking: $f"
            bash -n "$f" || fail=1
          done < <(find . -type f -name '*.sh' -not -path './.git/*')
          exit "$fail"

      - name: 安装 shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: shellcheck 静态分析
        run: |
          set -e
          # SC1091: source 外部文件; SC2034: 未使用变量; SC2155: declare+assign
          # 这些在我们的脚本里多为合理用法，先放过
          find . -type f -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -S warning -e SC1091,SC2034,SC2155 || \
              { echo "::warning::shellcheck 发现问题（warning 级别）"; exit 1; }

      - name: 禁止 $var 紧贴非 ASCII 字符（兼容 bash 3.2）
        run: |
          set -e
          # 背景：macOS 自带 bash 3.2 解析 $var 时会把多字节字符首字节
          # 当作 identifier 续接，在 set -u 下会报 "varname<乱码>: unbound variable"。
          # 修复方式：紧贴中文/非 ASCII 字符的变量引用一律写成 ${var}。
          if find . -type f -name '*.sh' -not -path './.git/*' -print0 \
               | xargs -0 grep -nP '\$[A-Za-z_][A-Za-z0-9_]*[^\x00-\x7F]'; then
            echo "::error::发现 \$var 后直接跟非 ASCII 字符，请改写为 \${var}"
            exit 1
          fi

  install-roundtrip:
    name: 本地安装/卸载端到端测试
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: 项目级安装到临时目录
        run: |
          set -e
          PROJ=$(mktemp -d)
          echo "PROJ=$PROJ"
          ./install.sh "$PROJ"
          # 校验关键文件
          test -f "$PROJ/.agents/skills/auto-plan-and-execute/SKILL.md"
          test -f "$PROJ/.claude/skills/auto-plan-and-execute/SKILL.md"
          test -x "$PROJ/.agents/skills/auto-plan-and-execute/auto-flow.sh"
          test -x "$PROJ/.claude/skills/auto-plan-and-execute/scripts/auto-flow.sh"
          # install.sh 自身应被排除
          test ! -f "$PROJ/.agents/skills/auto-plan-and-execute/install.sh"
          test ! -f "$PROJ/.claude/skills/auto-plan-and-execute/install.sh"
          echo "PROJ=$PROJ" >> "$GITHUB_ENV"

      - name: 重复安装应清除旧版
        run: |
          set -e
          touch "$PROJ/.agents/skills/auto-plan-and-execute/STALE.md"
          ./install.sh "$PROJ"
          test ! -f "$PROJ/.agents/skills/auto-plan-and-execute/STALE.md"

      - name: 全局安装到临时 HOME
        run: |
          set -e
          FAKE_HOME=$(mktemp -d)
          HOME="$FAKE_HOME" ./install.sh -g
          test -f "$FAKE_HOME/.agents/skills/auto-plan-and-execute/SKILL.md"
          test -f "$FAKE_HOME/.claude/skills/auto-plan-and-execute/SKILL.md"
          echo "FAKE_HOME=$FAKE_HOME" >> "$GITHUB_ENV"

      - name: -g 与 <目标> 互斥应失败
        run: |
          set -e
          if ./install.sh -g /tmp 2>/dev/null; then
            echo "❌ 互斥校验失效"
            exit 1
          else
            echo "✅ 互斥校验生效"
          fi

      - name: 全局卸载
        run: |
          set -e
          HOME="$FAKE_HOME" ./install.sh -g --uninstall
          test ! -d "$FAKE_HOME/.agents/skills/auto-plan-and-execute"
          test ! -d "$FAKE_HOME/.claude/skills/auto-plan-and-execute"

      - name: 项目级卸载
        run: |
          set -e
          ./install.sh --uninstall "$PROJ"
          test ! -d "$PROJ/.agents/skills/auto-plan-and-execute"
          test ! -d "$PROJ/.claude/skills/auto-plan-and-execute"

  auto-flow-cli:
    name: auto-flow.sh CLI 烟雾测试（不调用 claude）
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest 自带 /bin/bash 3.2，能复现多字节字符相关解析 bug；
        # 显式声明 SHELL 走 /bin/bash 而非 GitHub 默认的 bash（zsh 兼容层）。
        include:
          - os: ubuntu-latest
            shell_bin: bash
          - os: macos-latest
            shell_bin: /bin/bash
    env:
      SHELL_BIN: ${{ matrix.shell_bin }}
    steps:
      - uses: actions/checkout@v4

      - name: 打印 bash 版本（确认覆盖到 bash 3.2）
        run: "$SHELL_BIN --version | head -1"

      - name: --help 输出
        run: $SHELL_BIN ./auto-flow.sh --help

      - name: --list 在无实例时应正常返回
        run: $SHELL_BIN ./auto-flow.sh --list

      - name: --resume 缺参数应失败
        run: |
          if $SHELL_BIN ./auto-flow.sh --resume 2>/dev/null; then
            echo "❌ 应拒绝空参数"; exit 1
          else
            echo "✅ 拒绝空参数"
          fi

      - name: --resume 找不到实例应失败
        run: |
          if $SHELL_BIN ./auto-flow.sh --resume nonexistent-deadbeef 2>/dev/null; then
            echo "❌ 应失败"; exit 1
          else
            echo "✅ 报告找不到实例"
          fi

      - name: --resume 已有实例（mock claude）应跑到"已存在 plan-v1.md"分支
        run: |
          set -e
          # 伪造一个已经走到 plan 第 1 轮的实例：plan-v1.md 和 plan-review-v1.md
          # 都已落盘且 review 标记 PASS。此时 stage_plan_loop 会进入"已存在
          # $plan_doc，跳过生成"和"已存在 $review_doc，跳过审查"两条 log。
          # 这正是 bash 3.2 上 $var 紧贴中文字符触发 unbound variable 的代码路径。
          # CLAUDE_BIN=true 让 require_cmd 通过；真正进入循环时不应再调用 claude。
          INST=smoke-test-deadbeef
          WD=".auto-flow/$INST"
          mkdir -p "$WD"
          echo "smoke" > "$WD/context.md"
          echo "# plan v1" > "$WD/plan-v1.md"
          printf '%s\n' "# review v1" "STATUS: PASS" > "$WD/plan-review-v1.md"
          cat > "$WD/state.json" <<EOF
          {
            "instance": "$INST",
            "stage": "plan",
            "plan_iter": "0",
            "exec_iter": "0",
            "plan_final": "",
            "updated_at": "1970-01-01T00:00:00Z"
          }
          EOF
          # SKIP_CONFIRM=1 跳过人工确认；流程会进入 execute 阶段后因 plan_final
          # 为空 / claude=true 不会产出 exec_log 而失败退出。我们只关心 plan 阶段
          # 那两条 log 不再触发 unbound variable。
          # bug 触发时错误信息含非 UTF-8 字节，grep 默认会把输出当二进制忽略，
          # 所以用 -a 强制按文本匹配。
          CLAUDE_BIN=true SKIP_CONFIRM=1 $SHELL_BIN ./auto-flow.sh --resume deadbeef >out.txt 2>&1 || true
          cat out.txt
          if grep -aq "unbound variable" out.txt; then
            echo "❌ 出现 unbound variable，bash 3.2 兼容性回归"
            exit 1
          fi
          if ! grep -aq "已存在.*plan-v1.md" out.txt; then
            echo "❌ 未走到\"已存在 plan-v1.md\"分支，用例失效"
            exit 1
          fi
          echo "✅ resume 已有实例无 unbound variable"
